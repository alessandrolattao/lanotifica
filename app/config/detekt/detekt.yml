build:
  maxIssues: 0

complexity:
  active: true
  ComplexCondition:
    active: true
    threshold: 5
  CyclomaticComplexMethod:
    active: true
    threshold: 20
    ignoreSingleWhenExpression: true
    ignoreAnnotated:
      - "Composable"
  LongMethod:
    active: true
    threshold: 80
    ignoreAnnotated:
      - "Composable"
  LongParameterList:
    active: true
    functionThreshold: 12
    constructorThreshold: 8
    ignoreAnnotated:
      - "Composable"
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 15
    thresholdInObjects: 15
  LargeClass:
    active: true
    threshold: 600
  NestedBlockDepth:
    active: true
    threshold: 5

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  RedundantSuspendModifier:
    active: true
  SuspendFunSwallowedCancellation:
    active: true

empty-blocks:
  active: true
  EmptyCatchBlock:
    active: true
    allowedExceptionNameRegex: "_|(ignored|expected).*"

exceptions:
  active: true
  TooGenericExceptionCaught:
    # Network and binder IPC code legitimately catches broad exceptions
    active: false
  TooGenericExceptionThrown:
    active: true
  SwallowedException:
    active: true
    # Allow intentional swallowing: NameNotFoundException (fallback to pkg name),
    # and Exception in decrypt (returns empty on tampered data - by design)
    allowedExceptionNameRegex: "_|(ignored|expected).*|NameNotFoundException|Exception"

naming:
  active: true
  ClassNaming:
    active: true
  FunctionNaming:
    active: true
    ignoreAnnotated:
      - "Composable"
  ConstructorParameterNaming:
    active: true
    # Allow snake_case names for JSON DTO fields in network layer
    parameterPattern: "[a-z][a-zA-Z0-9_]*"
  VariableNaming:
    active: true

performance:
  active: true
  ArrayPrimitive:
    active: true
  ForEachOnRange:
    active: true

potential-bugs:
  active: true
  CastToNullableType:
    active: true
  DontDowncastCollectionTypes:
    active: true
  EqualsAlwaysReturnsTrueOrFalse:
    active: true
  ExplicitGarbageCollectionCall:
    active: true
  HasPlatformType:
    active: true
  ImplicitDefaultLocale:
    active: true
  NullCheckOnMutableProperty:
    active: true
  UnconditionalJumpStatementInLoop:
    active: true
  UnnecessaryNotNullCheck:
    active: true
  UnnecessaryNotNullOperator:
    active: true
  UnsafeCast:
    active: true
  UselessPostfixExpression:
    active: true

style:
  active: true
  MagicNumber:
    active: false
  ReturnCount:
    active: true
    max: 6
    ignoreAnnotated:
      - "Composable"
  ThrowsCount:
    active: true
    max: 3
  UnnecessaryAbstractClass:
    active: true
  UnusedPrivateMember:
    active: true
  UseCheckOrError:
    active: true
  UseRequire:
    active: true
  WildcardImport:
    active: true
    excludeImports:
      - "kotlinx.coroutines.*"
